services:
  # PostgreSQL - Production application database
  postgres:
    image: postgres:16-alpine
    container_name: ocmri-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocmri}
      POSTGRES_USER: ${POSTGRES_USER:-ocmri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocmri_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocmri}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend - FastAPI application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocmri-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ocmri}:${POSTGRES_PASSWORD:-ocmri_secret}@postgres:5432/${POSTGRES_DB:-ocmri}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-ocmri}:${POSTGRES_PASSWORD:-ocmri_secret}@postgres:5432/${POSTGRES_DB:-ocmri}
      - DUCKDB_PATH=/app/data/duckdb/analytics.duckdb
      - DATA_DIR=/app/data
      - EXCEL_DIR=/app/data/excel
      - EOBS_DIR=/app/data/eobs
      - SCHEDULES_DIR=/app/data/schedules
      - PAYMENTS_DIR=/app/data/payments
      - PROCESSED_DIR=/app/data/processed
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OCDR_PORTAL_URLS=${OCDR_PORTAL_URLS:-https://www.officeally.com/Logout.aspx?Timeout=1;https://x02.officeally.com/auth0bridge/Logon?ReturnUrl=/secure_oa.asp;https://myservices.optumhealthpaymentservices.com/registrationSignIn.do;https://identity.onehealthcareid.com/oneapp/index.html#/login}
      - OCDR_PORTAL_DOWNLOAD_DIR=${OCDR_PORTAL_DOWNLOAD_DIR:-/app/data/portal-downloads}
      - OCDR_PORTAL_STAGING_DIR=${OCDR_PORTAL_STAGING_DIR:-/app/data/portal-staging}
      - OCDR_PORTAL_STATE_DIR=${OCDR_PORTAL_STATE_DIR:-/app/data/portal-state}
      - OCDR_PORTAL_DOWNLOAD_EXTENSIONS=${OCDR_PORTAL_DOWNLOAD_EXTENSIONS:-.835,.edi,.txt,.dat,.era,.pdf,.csv,.xlsx,.xls,.zip}
      - OCDR_PORTAL_MIN_AGE_SECONDS=${OCDR_PORTAL_MIN_AGE_SECONDS:-15}
      - OCDR_PORTAL_MAX_AGE_HOURS=${OCDR_PORTAL_MAX_AGE_HOURS:-72}
      - OCDR_OFFICEALLY_RESET_DELAY_SECONDS=${OCDR_OFFICEALLY_RESET_DELAY_SECONDS:-2}
      - OCDR_SCANSNAP_HOST=${OCDR_SCANSNAP_HOST:-anikd@ocr-node}
      - OCDR_SCANSNAP_STATUS_TIMEOUT_SECONDS=${OCDR_SCANSNAP_STATUS_TIMEOUT_SECONDS:-8}
      - PAYER_PORTAL_URL=${PAYER_PORTAL_URL:-https://pm.officeally.com/pm/login.aspx}
      - OFFICE_ALLY_USER=${OFFICE_ALLY_USER:-}
      - OFFICE_ALLY_PASSWORD=${OFFICE_ALLY_PASSWORD:-}
      - PACS_PORTAL_URL=${PACS_PORTAL_URL:-}
      - PURVIEW_USER=${PURVIEW_USER:-}
      - PURVIEW_PASSWORD=${PURVIEW_PASSWORD:-}
      - BANK_PORTAL_URL=${BANK_PORTAL_URL:-}
      - BANK_PORTAL_USER=${BANK_PORTAL_USER:-}
      - BANK_PORTAL_PASSWORD=${BANK_PORTAL_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ${OCDR_BACKEND_SSH_DIR:-/tmp/ocdr-empty-ssh}:/root/.ssh:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # Frontend - React application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocmri-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:${BACKEND_PORT:-8000}
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OCDR{% endblock %} – OCDR Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">OCDR Billing</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navLinks">
                <div class="navbar-nav">
                    <a class="nav-link" href="/denials">Appeal Queue</a>
                    <a class="nav-link" href="/underpayments">Underpayments</a>
                    <a class="nav-link" href="/filing-deadlines">Filing Deadlines</a>
                    <a class="nav-link" href="/secondary-followup">Secondary Follow-Up</a>
                    <a class="nav-link" href="/duplicates">Duplicates</a>
                    <a class="nav-link text-muted" href="/denials/written-off">Written Off</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

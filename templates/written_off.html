{% extends "base.html" %}
{% block title %}Written-Off Claims{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Written-Off Claims</h4>
    <div>
        <span class="badge bg-secondary" id="total-count">–</span> claims
        <button class="btn btn-outline-warning btn-sm ms-2" id="btn-bulk-restore" disabled>
            Restore Selected
        </button>
    </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
    <form id="filter-form" class="row g-2 align-items-end">
        <div class="col-auto">
            <label class="form-label form-label-sm mb-0">Carrier</label>
            <select class="form-select form-select-sm" id="filter-carrier">
                <option value="">All Carriers</option>
            </select>
        </div>
        <div class="col-auto">
            <label class="form-label form-label-sm mb-0">Modality</label>
            <select class="form-select form-select-sm" id="filter-modality">
                <option value="">All Modalities</option>
            </select>
        </div>
        <div class="col-auto">
            <label class="form-label form-label-sm mb-0">From</label>
            <input type="date" class="form-control form-control-sm" id="filter-date-from">
        </div>
        <div class="col-auto">
            <label class="form-label form-label-sm mb-0">To</label>
            <input type="date" class="form-control form-control-sm" id="filter-date-to">
        </div>
        <div class="col-auto">
            <label class="form-label form-label-sm mb-0">Search</label>
            <input type="text" class="form-control form-control-sm" id="filter-search" placeholder="Patient or doctor…">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">Apply</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-clear-filters">Clear</button>
        </div>
    </form>
</div>

<div class="position-relative">
    <div class="loading-overlay d-none" id="loading">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover table-dense sortable-table mb-0" id="queue-table">
            <thead class="table-light">
                <tr>
                    <th><input type="checkbox" id="select-all" title="Select all"></th>
                    <th data-sort="patient_name">Patient</th>
                    <th data-sort="insurance_carrier">Carrier</th>
                    <th data-sort="modality">Modality</th>
                    <th data-sort="service_date" class="sort-desc">Service Date</th>
                    <th data-sort="billed_amount">Billed</th>
                    <th data-sort="total_payment">Paid</th>
                    <th data-sort="denial_reason_code">Reason</th>
                    <th data-sort="referring_doctor">Ref. Doctor</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="queue-body"></tbody>
        </table>
    </div>
</div>

<nav class="mt-3">
    <ul class="pagination pagination-sm justify-content-center" id="pagination"></ul>
</nav>
{% endblock %}

{% block scripts %}
<script src="/static/js/sortable-table.js"></script>
<script>
(function () {
    'use strict';
    const esc = SortableTable.esc;
    const fmt$ = SortableTable.fmt$;

    const table = new SortableTable({
        apiUrl:       '/api/denials/written-off',
        filtersUrl:   '/api/denials/filters',
        tableId:      'queue-table',
        bodyId:       'queue-body',
        paginationId: 'pagination',
        totalId:      'total-count',
        loadingId:    'loading',
        filterFormId: 'filter-form',
        clearBtnId:   'btn-clear-filters',
        defaultSort:  'service_date',
        defaultOrder: 'desc',
        perPage:      50,
        columns: [
            { key: 'id', render: (v) => `<input type="checkbox" class="row-select" value="${v}">` },
            { key: 'patient_name', render: (v, r) => `<a href="/denials/${r.id}">${esc(v)}</a>` },
            { key: 'insurance_carrier' },
            { key: 'modality' },
            { key: 'service_date' },
            { key: 'billed_amount', className: 'text-end', render: (v) => fmt$(v) },
            { key: 'total_payment', className: 'text-end', render: (v) => fmt$(v) },
            { key: 'denial_reason_code', render: (v) => esc(v || '–') },
            { key: 'referring_doctor', render: (v) => esc(v || '–') },
            { key: 'id', render: (v) =>
                `<button class="btn btn-outline-warning btn-sm py-0 px-1" onclick="restoreClaim(${v})">Restore</button>`
            },
        ],
        filterFields: [
            { id: 'filter-carrier',   param: 'carrier' },
            { id: 'filter-modality',  param: 'modality' },
            { id: 'filter-date-from', param: 'date_from' },
            { id: 'filter-date-to',   param: 'date_to' },
            { id: 'filter-search',    param: 'search' },
        ],
    });

    // Select-all
    document.getElementById('select-all').addEventListener('change', function () {
        document.querySelectorAll('.row-select').forEach(cb => cb.checked = this.checked);
        updateBulkBtn();
    });
    document.getElementById('queue-body').addEventListener('change', function (e) {
        if (e.target.classList.contains('row-select')) updateBulkBtn();
    });
    function updateBulkBtn() {
        document.getElementById('btn-bulk-restore').disabled = !document.querySelectorAll('.row-select:checked').length;
    }

    // Restore single
    window.restoreClaim = async function(id) {
        try {
            const resp = await fetch(`/api/denials/${id}/undo-writeoff`, { method: 'POST' });
            if (resp.ok) table.fetch();
            else alert('Failed to restore claim');
        } catch (err) { alert('Error: ' + err.message); }
    };

    // Bulk restore
    document.getElementById('btn-bulk-restore').addEventListener('click', async () => {
        const ids = [...document.querySelectorAll('.row-select:checked')].map(cb => parseInt(cb.value));
        if (!ids.length) return;
        try {
            await fetch('/api/denials/bulk-undo-writeoff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids }),
            });
            table.fetch();
        } catch (err) { alert('Error: ' + err.message); }
    });
})();
</script>
{% endblock %}
